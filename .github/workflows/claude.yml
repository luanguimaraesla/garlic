name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned, labeled]

jobs:
  claude:
    if: |
      github.event.sender.type == 'User' &&
      (
        github.event.author_association == 'OWNER' ||
        github.event.author_association == 'MEMBER' ||
        github.event.author_association == 'COLLABORATOR'
      ) &&
      (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
        (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          assignee_trigger: "claude"
          label_trigger: "claude"

          claude_args: |
            --max-turns 30
            --allowedTools "Bash(make:*),Bash(go doc:*),Bash(go test:*),Bash(go build:*),Bash(gh pr:*),Bash(gh issue:*),Bash(git status:*),Bash(git log:*),Bash(git diff:*)"
