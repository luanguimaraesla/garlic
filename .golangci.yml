version: "2"

run:
  build-tags:
    - unit

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/luanguimaraesla/garlic

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - misspell
    - unconvert
    - unparam
  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - performance

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
